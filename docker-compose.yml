name: postgres-master-slave
services:
  postgresql-master:
    image: bitnami/postgresql:latest
    shm_size: '1gb'
    environment:
      - POSTGRESQL_REPLICATION_MODE=${POSTGRESQL_REPLICATION_MODE}
      - POSTGRESQL_REPLICATION_USER=${POSTGRESQL_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRESQL_REPLICATION_PASSWORD}
      - POSTGRESQL_USERNAME=${POSTGRESQL_USERNAME}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - ./data/master:/bitnami/postgresql

  postgresql-slave:
    image: bitnami/postgresql:latest
    shm_size: '1gb'
    depends_on:
      - postgresql-master
    environment:
      - POSTGRESQL_REPLICATION_MODE=${POSTGRESQL_REPLICATION_MODE}
      - POSTGRESQL_MASTER_HOST=${POSTGRESQL_MASTER_HOST}
      - POSTGRESQL_MASTER_PORT_NUMBER=${POSTGRESQL_MASTER_PORT_NUMBER}
      - POSTGRESQL_REPLICATION_USER=${POSTGRESQL_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRESQL_REPLICATION_PASSWORD}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_MAX_CONNECTIONS=${POSTGRESQL_MAX_CONNECTIONS}
    volumes:
      - ./data/slave1:/bitnami/postgresql

  postgresql-slave2:
    image: bitnami/postgresql:latest
    shm_size: '1gb'
    depends_on:
      - postgresql-master
    environment:
      - POSTGRESQL_REPLICATION_MODE=${POSTGRESQL_REPLICATION_MODE}
      - POSTGRESQL_MASTER_HOST=${POSTGRESQL_MASTER_HOST}
      - POSTGRESQL_MASTER_PORT_NUMBER=${POSTGRESQL_MASTER_PORT_NUMBER}
      - POSTGRESQL_REPLICATION_USER=${POSTGRESQL_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRESQL_REPLICATION_PASSWORD}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_MAX_CONNECTIONS=${POSTGRESQL_MAX_CONNECTIONS}
    volumes:
      - ./data/slave2:/bitnami/postgresql

  postgresql-slave3:
    image: bitnami/postgresql:latest
    shm_size: '1gb'
    depends_on:
      - postgresql-master
    environment:
      - POSTGRESQL_REPLICATION_MODE=${POSTGRESQL_REPLICATION_MODE}
      - POSTGRESQL_MASTER_HOST=${POSTGRESQL_MASTER_HOST}
      - POSTGRESQL_MASTER_PORT_NUMBER=${POSTGRESQL_MASTER_PORT_NUMBER}
      - POSTGRESQL_REPLICATION_USER=${POSTGRESQL_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRESQL_REPLICATION_PASSWORD}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_MAX_CONNECTIONS=${POSTGRESQL_MAX_CONNECTIONS}
    volumes:
      - ./data/slave3:/bitnami/postgresql

  postgresql-slave4:
    image: bitnami/postgresql:latest
    shm_size: '1gb'
    depends_on:
      - postgresql-master
    environment:
      - POSTGRESQL_REPLICATION_MODE=${POSTGRESQL_REPLICATION_MODE}
      - POSTGRESQL_MASTER_HOST=${POSTGRESQL_MASTER_HOST}
      - POSTGRESQL_MASTER_PORT_NUMBER=${POSTGRESQL_MASTER_PORT_NUMBER}
      - POSTGRESQL_REPLICATION_USER=${POSTGRESQL_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRESQL_REPLICATION_PASSWORD}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_MAX_CONNECTIONS=${POSTGRESQL_MAX_CONNECTIONS}
    volumes:
      - ./data/slave4:/bitnami/postgresql

  haproxy:
    image: haproxy:latest
    container_name: haproxy-lb
    depends_on:
      - postgresql-slave
      - postgresql-slave2
      - postgresql-slave3
      - postgresql-slave4
    volumes:
      - .haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5433:5432"
      - "8404:8404"
  
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-web
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "9090:80"
    depends_on:
      - postgresql-master
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq

  redis:
    image: redis:trixie
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/var/lib/redis
  minio:
    image: quay.io/minio/minio
    container_name: minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
        MINIO_ROOT_USER: admin
        MINIO_ROOT_PASSWORD: admin@123
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 20s
      retries: 5
  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_local: ${MC_HOST_local}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};

      mc mb --ignore-existing local/${MINIO_SVC_BUCKET};
      
      echo '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"s3:*\"],\"Resource\":[\"arn:aws:s3:::${MINIO_SVC_BUCKET}/*\"]}]}' > /tmp/policy.json;
      mc admin policy create local custom-policy /tmp/policy.json;
      
      mc admin user add local ${MINIO_SVC_USER} ${MINIO_SVC_PASSWORD};
      
      mc admin policy attach local custom-policy --user ${MINIO_SVC_USER};
      
      exit 0;
      "

  jod-converter:
    image: ghcr.io/jodconverter/jodconverter-examples:rest
    ports:
      - "8090:8080"

  app:
    build: D:/.LT/spring-jpa/.
    ports:
      - "8088:8088"
    depends_on:
      - jod-converter
      - postgresql-master
    environment:
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: admin@123